<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#07111f" />
  <title>登录 - api-v2ray 控制台</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a1426'/><text x='16' y='22' text-anchor='middle' font-size='16' fill='%235da8ff'>V</text></svg>" />
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body data-page="login">
  <div id="toast" class="toast" aria-live="polite"></div>
  <main class="center-wrap auth-shell">
    <section class="card auth-card glass-card">
      <div class="eyebrow">api-v2ray</div>
      <h1>控制台登录</h1>
      <p class="muted">所有控制台页面与管理接口都需要密钥，登录后即可进入完整管理界面。</p>
      <div class="form-grid one-col">
        <label>管理密钥<input id="login-token" type="password" placeholder="请输入控制台密钥" autofocus /></label>
        <button class="btn primary wide" data-action="login" data-busy-text="登录中">登录</button>
        <p class="muted small" style="text-align:center;margin:0">按 Enter 快速登录</p>
      </div>
      <pre id="login-log" class="log-box hidden"></pre>
    </section>
  </main>
  <script src="/ui/app.js"></script>
</body>
</html>
