<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bootstrap 结果 - api-v2ray</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body data-page="bootstrap">
  <header class="topbar">
    <div>
      <h1>Bootstrap 结果</h1>
      <p class="muted">支持回溯、刷新、查看平铺结果和分阶段结果</p>
    </div>
    <nav class="nav-actions">
      <a class="btn" href="/">返回首页</a>
      <a class="btn" href="/config">去配置页</a>
      <button class="btn" data-action="logout">退出登录</button>
      <button class="btn primary" data-action="run-bootstrap">重新执行 Bootstrap</button>
    </nav>
  </header>

  <main class="layout">
    <section class="card">
      <div class="card-head"><h2>摘要</h2></div>
      <div id="bootstrap-summary" class="grid"></div>
    </section>
    <section class="card">
      <div class="card-head"><h2>结果 JSON</h2></div>
      <pre id="bootstrap-json" class="log-box"></pre>
    </section>
  </main>
  <script src="/ui/app.js"></script>
</body>
</html>
