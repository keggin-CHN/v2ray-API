<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bootstrap 结果 - api-v2ray</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body data-page="bootstrap">
  <div id="toast" class="toast" aria-live="polite"></div>
  <header class="topbar shell-bar">
    <div class="headline">
      <div class="eyebrow">api-v2ray</div>
      <h1>Bootstrap 结果</h1>
      <p class="muted">支持回溯、刷新与重新执行，结果视图更清楚。</p>
    </div>
    <nav class="nav-actions wrap">
      <a class="btn ghost" href="/">返回首页</a>
      <a class="btn ghost" href="/config">去配置页</a>
      <button class="btn danger" data-action="logout" data-busy-text="退出中">退出登录</button>
      <button class="btn primary" data-action="run-bootstrap" data-busy-text="执行中">重新执行 Bootstrap</button>
    </nav>
  </header>

  <main class="layout">
    <section class="card">
      <div class="card-head compact-head">
        <div>
          <h2>摘要</h2>
          <p class="muted small">从结果中提炼关键数字</p>
        </div>
      </div>
      <div id="bootstrap-summary" class="grid metrics-grid"></div>
    </section>
    <section class="card">
      <div class="card-head compact-head">
        <div>
          <h2>结果 JSON</h2>
          <p class="muted small">完整结果原样展示</p>
        </div>
        <div class="quick-actions">
          <button class="btn sm" data-action="copy-bootstrap-json">复制结果</button>
        </div>
      </div>
      <pre id="bootstrap-json" class="log-box large-log"></pre>
    </section>
  </main>
  <script src="/ui/app.js"></script>
</body>
</html>
