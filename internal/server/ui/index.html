<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>api-v2ray 控制台</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body data-page="home">
  <header class="topbar">
    <div>
      <h1>api-v2ray 控制台</h1>
      <p class="muted">可视化查看状态、管理配置、回溯 Bootstrap 结果</p>
    </div>
    <nav class="nav-actions">
      <a class="btn" href="/">首页</a>
      <a class="btn" href="/config">配置管理</a>
      <a class="btn" href="/bootstrap">运行结果</a>
    </nav>
  </header>

  <main class="layout two-col">
    <section class="card">
      <div class="card-head">
        <h2>服务概览</h2>
        <button class="btn primary" data-action="refresh-status">刷新</button>
      </div>
      <div id="status-grid" class="grid"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>快速入口</h2>
      </div>
      <div class="quick-actions">
        <a class="btn primary" href="/config">编辑配置</a>
        <a class="btn" href="/bootstrap">查看 Bootstrap 结果</a>
        <button class="btn" data-action="logout">退出登录</button>
        <a class="btn" href="/healthz" target="_blank" rel="noreferrer">打开 /healthz</a>
        <a class="btn" href="/v1/models" target="_blank" rel="noreferrer">打开 /v1/models</a>
      </div>
    </section>

    <section class="card full-span">
      <div class="card-head">
        <h2>接口导航</h2>
      </div>
      <table class="table">
        <thead><tr><th>路径</th><th>方法</th><th>说明</th><th>操作</th></tr></thead>
        <tbody>
          <tr><td>/</td><td>GET</td><td>控制台首页</td><td><a class="btn" href="/">打开</a></td></tr>
          <tr><td>/config</td><td>GET</td><td>可视化配置页面</td><td><a class="btn" href="/config">打开</a></td></tr>
          <tr><td>/bootstrap</td><td>GET</td><td>Bootstrap 结果页面</td><td><a class="btn" href="/bootstrap">打开</a></td></tr>
          <tr><td>/healthz</td><td>GET</td><td>健康检查</td><td><a class="btn" href="/healthz" target="_blank">打开</a></td></tr>
          <tr><td>/v1/models</td><td>GET</td><td>模型列表</td><td><a class="btn" href="/v1/models" target="_blank">打开</a></td></tr>
          <tr><td>/v1/chat/completions</td><td>POST</td><td>聊天补全</td><td><button class="btn disabled" disabled>API 调用</button></td></tr>
          <tr><td>/v1/embeddings</td><td>POST</td><td>向量接口</td><td><button class="btn disabled" disabled>API 调用</button></td></tr>
        </tbody>
      </table>
    </section>
  </main>
  <script src="/ui/app.js"></script>
</body>
</html>
